<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- Background gradient circle -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main briefcase/document shape -->
  <g>
    <!-- Briefcase body -->
    <rect x="10" y="12" width="28" height="20" rx="2" fill="url(#grad1)" opacity="0.9"/>
    
    <!-- Document/paper accent -->
    <rect x="14" y="8" width="20" height="24" rx="2" fill="url(#grad1)" opacity="0.7"/>
    
    <!-- Growth arrow (checkmark style) -->
    <path d="M 28 20 L 32 24 L 38 16" stroke="url(#grad2)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Highlight accent -->
    <rect x="10" y="12" width="28" height="3" rx="1" fill="#10b981" opacity="0.6"/>
  </g>
  
  <!-- Corner accent glow -->
  <circle cx="36" cy="12" r="4" fill="url(#grad2)" opacity="0.3"/>
</svg>